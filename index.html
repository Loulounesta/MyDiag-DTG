<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyDiag DTG Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --p: #1a237e; --s: #0288d1; --a: #2e7d32; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); display: flex; flex-direction: column; height: 100vh; }
        
        /* Navigation par onglets */
        .tabs { display: flex; overflow-x: auto; background: var(--p); color: white; sticky: top; z-index: 100; }
        .tab { padding: 15px 20px; white-space: nowrap; cursor: pointer; border-bottom: 3px solid transparent; opacity: 0.7; }
        .tab.active { opacity: 1; border-bottom: 3px solid #ffeb3b; font-weight: bold; }

        /* Contenu */
        .content { flex: 1; overflow-y: auto; padding: 15px; }
        .view { display: none; }
        .view.active { display: block; }

        /* Cartes et Formulaires */
        .card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        button { background: var(--s); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; margin: 5px 0; }
        .btn-capture { background: #444; }
        .btn-save { background: var(--a); }

        /* Galerie de miniatures */
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 15px; }
        .thumb { position: relative; width: 100%; aspect-ratio: 1; border-radius: 6px; overflow: hidden; border: 1px solid #ddd; }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }
        .thumb-label { position: absolute; bottom: 0; background: rgba(0,0,0,0.6); color: white; font-size: 9px; width: 100%; padding: 2px; }

        #canvas-buffer { display: none; }
        .config-box { font-size: 12px; background: #eee; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="tabs" id="tabBar">
    <div class="tab active" onclick="showTab('DASHBOARD')">🏠 PROJET</div>
    <div class="tab" onclick="showTab('STRUCTURE')">🏗️ STRUCTURE</div>
    <div class="tab" onclick="showTab('CLOS')">🏠 CLOS/COUVERT</div>
    <div class="tab" onclick="showTab('TECHNIQUE')">⚙️ TECHNIQUE</div>
    <div class="tab" onclick="showTab('SECURITE')">🛡️ SÉCURITÉ</div>
    <div class="tab" onclick="showTab('EXPORT')" style="background: #e67e22;">📦 EXPORT</div>
</div>

<div class="content">
    <div id="view-DASHBOARD" class="view active">
        <div class="card">
            <label>Nom de la Copropriété :</label>
            <input type="text" id="projName" placeholder="Ex: Résidence Les Fleurs" oninput="saveProj()">
            <label>Clé API OpenAI :</label>
            <input type="password" id="apiKey" value="AIzaSyALgB9zjGn0d7X7z5WeelO2vMEYTwwx-Fc" oninput="saveProj()">
        </div>
        <div class="config-box">
            Données sauvegardées localement. Vous pouvez fermer le navigateur, rien ne sera perdu.
        </div>
    </div>

    <div id="view-POSTE" class="view">
        <h2 id="currentPosteTitle">Rubrique</h2>
        <div class="card">
            <label>Poste spécifique :</label>
            <select id="subPoste"></select>
            <button class="btn-capture" onclick="triggerCamera()">📸 PRENDRE PHOTO</button>
            <input type="file" id="fileInput" accept="image/*" capture="camera" style="display:none" onchange="handlePhoto(event)">
        </div>
        
        <div id="analysisCard" class="card" style="display:none">
            <textarea id="legendeIA" rows="3" placeholder="Analyse en cours..."></textarea>
            <button class="btn-save" onclick="finalizePhoto()">VALIDER & INCRUSTER</button>
        </div>

        <div class="gallery" id="currentGallery"></div>
    </div>

    <div id="view-EXPORT" class="view">
        <div class="card">
            <h3>Finalisation du rapport</h3>
            <p>Total photos : <span id="countPhotos">0</span></p>
            <button onclick="downloadJSON()" style="background:#607d8b;">💾 EXPORTER JSON (SAUVEGARDE)</button>
            <button onclick="downloadZIP()" style="background:#d32f2f;">📦 GÉNÉRER ZIP (PNG + NOMENCLATURE)</button>
            <button onclick="clearAllData()" style="background:#f44336; margin-top:20px; font-size:10px;">EFFACER TOUT LE PROJET</button>
        </div>
    </div>
</div>

<canvas id="canvas-buffer"></canvas>

<script>
    // --- CONFIGURATION NOMENCLATURE ---
    const NOMENCLATURE = {
        'STRUCTURE': ['FONDATIONS', 'PLANCHERS', 'MURS ET FAÇADES', 'BALCONS'],
        'CLOS': ['COUVERTURE', 'CHARPENTE', 'FENETRES', 'PORTES'],
        'TECHNIQUE': ['VENTILATION', 'EAU FROIDE', 'EAUX USEES', 'CHAUFFAGE'],
        'SECURITE': ['SECURITE INCENDIE', 'AMIANTE', 'PLOMB', 'ASCENSEURS']
    };

    let projectData = {
        name: "",
        apiKey: "AIzaSyALgB9zjGn0d7X7z5WeelO2vMEYTwwx-Fc",
        photos: [] // {id, category, subCategory, label, base64}
    };

    let activeCat = "";

    // --- LOGIQUE DES ONGLETS ---
    function showTab(cat) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        
        if (NOMENCLATURE[cat]) {
            activeCat = cat;
            document.getElementById('view-POSTE').classList.add('active');
            document.getElementById('currentPosteTitle').innerText = cat;
            const sel = document.getElementById('subPoste');
            sel.innerHTML = NOMENCLATURE[cat].map(p => `<option>${p}</option>`).join('');
            renderGallery();
        } else {
            document.getElementById('view-' + cat).classList.add('active');
        }
        event.currentTarget.classList.add('active');
        if(cat === 'EXPORT') updateExportCount();
    }

    // --- PERSISTENCE ---
    function saveProj() {
        projectData.name = document.getElementById('projName').value;
        projectData.apiKey = document.getElementById('apiKey').value;
        localStorage.setItem('diag_dtg_data', JSON.stringify(projectData));
    }

    function loadProj() {
        const saved = localStorage.getItem('diag_dtg_data');
        if(saved) {
            projectData = JSON.parse(saved);
            document.getElementById('projName').value = projectData.name || "";
            document.getElementById('apiKey').value = projectData.apiKey || "";
        }
    }

    // --- GESTION PHOTOS ---
    function triggerCamera() { document.getElementById('fileInput').click(); }

    async function handlePhoto(e) {
        const file = e.target.files[0];
        if(!file) return;

        document.getElementById('analysisCard').style.display = 'block';
        document.getElementById('legendeIA').value = "Analyse IA en cours...";
        
        const reader = new FileReader();
        reader.onload = async (event) => {
            const base64 = event.target.result;
            // Appel IA
            const response = await callIA(base64);
            document.getElementById('legendeIA').value = response;
            window.lastRawImg = base64;
        };
        reader.readAsDataURL(file);
    }

    async function callIA(img) {
        try {
            const res = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${projectData.apiKey}` },
                body: JSON.stringify({
                    model: "gpt-4o",
                    messages: [{ role: "user", content: [
                        { type: "text", text: "Expert DTG: décris cette photo pour ADN Analysimmo (max 150 car.)" },
                        { type: "image_url", image_url: { url: img } }
                    ]}]
                })
            });
            const data = await res.json();
            return data.choices[0].message.content;
        } catch(e) { return "Observation terrain..."; }
    }

    function finalizePhoto() {
        const canvas = document.getElementById('canvas-buffer');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        img.onload = () => {
            canvas.width = 1000; canvas.height = 800;
            ctx.drawImage(img, 0, 0, 1000, 800);
            
            // Incrustation
            ctx.fillStyle = "rgba(0,0,0,0.7)";
            ctx.fillRect(0, 700, 1000, 100);
            ctx.fillStyle = "white"; ctx.font = "20px Arial";
            ctx.fillText(document.getElementById('legendeIA').value, 20, 760);

            const finalBase64 = canvas.toDataURL("image/png");
            projectData.photos.push({
                id: Date.now(),
                category: activeCat,
                subCategory: document.getElementById('subPoste').value,
                label: document.getElementById('legendeIA').value,
                data: finalBase64
            });
            saveProj();
            renderGallery();
            document.getElementById('analysisCard').style.display = 'none';
        };
        img.src = window.lastRawImg;
    }

    function renderGallery() {
        const container = document.getElementById('currentGallery');
        const filtered = projectData.photos.filter(p => p.category === activeCat);
        container.innerHTML = filtered.map(p => `
            <div class="thumb">
                <img src="${p.data}">
                <div class="thumb-label">${p.subCategory}</div>
            </div>
        `).join('');
    }

    // --- EXPORTS ---
    function updateExportCount() { document.getElementById('countPhotos').innerText = projectData.photos.length; }

    function downloadJSON() {
        const blob = new Blob([JSON.stringify(projectData)], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `SAUVEGARDE_DTG_${projectData.name}.json`;
        a.click();
    }

    async function downloadZIP() {
        const zip = new JSZip();
        projectData.photos.forEach((p, index) => {
            const imgData = p.data.split(',')[1];
            zip.file(`${p.category}/${p.subCategory}_${index}.png`, imgData, {base64: true});
        });
        const content = await zip.generateAsync({type:"blob"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(content);
        a.download = `PHOTOS_DTG_${projectData.name}.zip`;
        a.click();
    }

    function clearAllData() { if(confirm("Effacer tout ?")) { localStorage.clear(); location.reload(); } }

    window.onload = loadProj;
</script>
</body>
</html>
