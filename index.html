<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>MyDiag-DTG</title>

    <link rel="apple-touch-icon" href="apple-touch-icon.?v=final">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="MyDiag-DTG">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#101844">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --adn-blue: #101844; --adn-gold: #c5a059; --bg: #f4f6f9; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: var(--bg); display: flex; flex-direction: column; height: 100vh; color: #333; -webkit-tap-highlight-color: transparent; }
        
        /* Navigation */
        .tabs { display: flex; overflow-x: auto; background: var(--adn-blue); scrollbar-width: none; border-bottom: 3px solid var(--adn-gold); flex-shrink: 0; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab { padding: 15px 15px; white-space: nowrap; cursor: pointer; color: white; opacity: 0.6; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }
        .tab.active { opacity: 1; background: rgba(255,255,255,0.1); }

        .container { flex: 1; overflow-y: auto; padding: 20px; }
        .view { display: none; }
        .view.active { display: block; }

        /* Accueil */
        .welcome-card { background: white; border-radius: 15px; padding: 35px 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #e1e4e8; }
        .welcome-card h1 { margin: 0 0 25px 0; color: var(--adn-blue); font-size: 1.6rem; }
        
        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.85rem; color: #555; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 14px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; box-sizing: border-box; background: #fff; }
        input#fileNumber { font-weight: bold; letter-spacing: 2px; color: var(--adn-blue); font-size: 1.2rem; }

        .card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); margin-bottom: 15px; border: 1px solid #eee; }
        .btn-action { background: var(--adn-blue); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; width: 100%; margin: 8px 0; font-size: 0.9rem; cursor: pointer; }
        .btn-lib { background: #546e7a; }
        .btn-save { background: #27ae60; }

        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 20px; }
        .gallery img { width: 100%; height: 90px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd; }
        
        #canvas-hidden { display: none; }
        .comment-list { max-height: 250px; overflow-y: auto; margin-top: 15px; }
        .comment-item { background: #f8fafc; padding: 10px; border-radius: 6px; border: 1px solid #e2e8f0; font-size: 0.85rem; cursor: pointer; margin-bottom: 5px; line-height: 1.4; }
        .comment-item:active { background: #e2e8f0; border-color: var(--adn-gold); }
    </style>
</head>
<body>

<div class="tabs">
    <div class="tab active" onclick="showTab('DASHBOARD')">Projet</div>
    <div class="tab" onclick="showTab('ENVELOPPE ET STRUCTURE')">1. Enveloppe</div>
    <div class="tab" onclick="showTab('SOUS-SOLS')">2. Sous-Sols</div>
    <div class="tab" onclick="showTab('PARTIES COMMUNES')">3. Communs</div>
    <div class="tab" onclick="showTab('FLUIDES ET RESEAUX')">4. Réseaux</div>
    <div class="tab" onclick="showTab('SECURITE GENERALE')">5. Sécu. Générale</div>
    <div class="tab" onclick="showTab('SECURITE SPECIFIQUE')">6. Sécu. Spécifique</div>
    <div class="tab" onclick="showTab('EXPORT')">Export</div>
</div>

<div class="container">
    <div id="view-DASHBOARD" class="view active">
        <div class="welcome-card">
            <h1>MyDiag DTG</h1>
            <div class="input-group">
                <label>N° de dossier (6 chiffres max) :</label>
                <input type="number" id="fileNumber" inputmode="numeric" pattern="[0-9]*" placeholder="000000" oninput="limit6(this)">
            </div>
            <div class="input-group">
                <label>Nom de la Copropriété :</label>
                <input type="text" id="projName" placeholder="Ex: Résidence Analysimmo" oninput="save()">
            </div>
        </div>
    </div>

    <div id="view-SECTION" class="view">
        <h2 id="secTitle" style="color:var(--adn-blue); font-size: 1.1rem;">Rubrique</h2>
        <div class="card">
            <label>Ouvrage observé :</label>
            <select id="subPoste" onchange="loadComments()"></select>
            
            <button class="btn-action" onclick="document.getElementById('inCam').click()">📸 PRENDRE UNE PHOTO</button>
            <button class="btn-action btn-lib" onclick="document.getElementById('inLib').click()">🖼️ GALERIE PHOTOS</button>
            
            <input type="file" id="inCam" accept="image/*" capture="environment" style="display:none" onchange="onFile(event)">
            <input type="file" id="inLib" accept="image/*" style="display:none" onchange="onFile(event)">
        </div>

        <div id="editor" class="card" style="display:none; border: 2px solid var(--adn-gold);">
            <label style="font-size: 0.8rem; color: var(--adn-blue);">Sélectionnez un constat ou tapez-le :</label>
            <textarea id="finalTxt" rows="3" placeholder="Saisir un commentaire..."></textarea>
            <div id="commentList" class="comment-list"></div>
            <button class="btn-action btn-save" onclick="savePhoto()">💾 VALIDER & SAUVER PNG</button>
        </div>

        <div class="gallery" id="gal"></div>
    </div>

    <div id="view-EXPORT" class="view">
        <div class="card">
            <h2>Génération des rapports</h2>
            <p style="font-size:0.9rem; color:#666;">Photos capturées : <strong id="photoCount">0</strong></p>
            <button class="btn-action" onclick="exportHTML()" style="background:#444">📄 VISIONNEUSE PC (HTML)</button>
            <button class="btn-action" onclick="exportZIP()" style="background:var(--adn-gold)">📦 EXPORT POUR ADN (ZIP)</button>
            <button class="btn-action" onclick="resetApp()" style="background:#c0392b; margin-top:30px; font-size:10px;">RÉINITIALISER L'APPLICATION</button>
        </div>
    </div>
</div>

<canvas id="canvas-hidden"></canvas>

<script>
    // ARBORESCENCE COMPLETE SELON LE FICHIER "TABLEAU DE BORD"
    const DB = {
        'ENVELOPPE ET STRUCTURE': {
            'FONDATIONS': ["FONDATIONS : OK. Pas de désordres symptomatiques.", "Fissures d’allure oblique présumant un tassement."],
            'PLANCHERS': ["Dalle béton ou hourdis / entrevous.", "Poutrelles métalliques oxydées.", "Structure bois."],
            'MURS, REFENDS ET FAÇADES': ["Pierre apparentes.", "Béton banché.", "Épaufrures de béton.", "Fissures structurelles."],
            'COUVERTURE': ["Tuiles mécaniques.", "Toit-terrasse PVC.", "Défaut d'étanchéité localisé."],
            'CHARPENTE': ["Charpente traditionnelle bois.", "Présence traces insectes xylophages.", "Déformations visibles."],
            'BALCONS': ["Garde-corps conformes.", "Oxydation des aciers en sous-face.", "Épaufrures en nez de dalle."],
            'FENETRES ET OCCULTATIONS': ["Menuiseries en bon état.", "Peinture écaillée / Vétusté.", "Remplacement pour confort thermique conseillé."],
            'PORTES': ["Porte d'accès principale en bon état.", "Porte d'accès vitrée simple (fragile).", "Porte coupe-feu présente."]
        },
        'SOUS-SOLS': {
            'CAVES': ["Caves sèches et ventilées.", "Humidité importante / salpêtre.", "Séparation bois à claire-voie."],
            'PARKING EN SOUS-SOL': ["Marquage sol visible.", "Marquage absent ou vétuste.", "Porte motorisée fonctionnelle."]
        },
        'PARTIES COMMUNES': {
            'HALLS D\'ENTREE': ["Accessible et dégagé.", "Embellissements dégradés / vétustes.", "Embellissements OK."],
            'ESCALIERS': ["Marches béton.", "Marches bois.", "Absence ou discontinuité de main courante.", "Embellissements à revoir."],
            'COULOIRS ET DEGAGEMENTS': ["Circulations dégagées.", "Encombrements observés.", "Embellissements OK."],
            'ECLAIRAGE': ["Éclairage suffisant.", "Éclairage insuffisant (points lumineux HS).", "Préconisation : Éclairage à détection."],
            'LOCAUX COMMUNS': ["Local OM propre.", "Locaux encombrés.", "Propreté / Hygiène à surveiller."],
            'LOCAUX TECHNIQUES': ["Accessibles et propres.", "Non accessibles le jour de la visite."],
            'ACCESSIBILITE ET STATIONNEMENT': ["Stationnement suffisant.", "Stationnement insuffisant.", "Contrôles portail automatique OK."],
            'SECURISATION DE L\'ACCES': ["Présence d'un interphone.", "Présence digicode/badge Vigik.", "Système hors service."],
            'DIVERS': ["Boîtes aux lettres OK.", "Boîtes aux lettres non conformes.", "Immeuble raccordé à la fibre."]
        },
        'FLUIDES ET RESEAUX': {
            'EAU FROIDE': ["Installation en bon état apparent.", "Traces de corrosion ou suintements ponctuels.", "Compteurs en parties communes."],
            'EAU CHAUDE SANITAIRE': ["Production collective.", "Installations individuelles."],
            'EVACUATION EAUX USEE ET EAUX VANNES': ["Réseau supposé en état satisfaisant.", "Canalisations vétustes ou fuyardes."],
            'ELECTRICITE': ["AGCP présent et accessible.", "Matériel vétuste / Câbles apparents.", "Absence de Mise à la terre conforme."],
            'GAZ': ["Bâtiment raccordé au réseau gaz.", "Compteurs gaz en gaine technique."],
            'CONSIGNES + COUPURE GAZ': ["OCG accessible et signalé. Boîtier OK.", "Défaut : Clé de manœuvre absente.", "Défaut : Consignes non affichées."],
            'CHAUFFAGE': ["Chauffage collectif gaz.", "Chauffage individuel électrique.", "Émetteurs radiateurs fonte."],
            'VENTILATION': ["VMC Simple flux autoréglable.", "VMC Hygro B.", "Ventilation naturelle."]
        },
        'SECURITE GENERALE': {
            'AMIANTE (SECURITE)': ["DTA à jour fourni.", "Aucun DTA transmis le jour de la visite.", "Immeuble non concerné (>1997)."],
            'PLOMB (SECURITE)': ["CREP fourni (Immeuble < 1949).", "Aucun CREP transmis.", "Immeuble non concerné."],
            'ASCENSEURS': ["Contrôle périodique annuel OK.", "Contrôle périodique non réalisé ou observations non levées."],
            'TRAPPE DE DESENFUMAGE': ["Installation conforme et manœuvrable.", "Installation non conforme ou absente."],
            'CONSIGNES ET PLAN D\'EVACUATION': ["Plans affichés et conformes.", "Plans d'évacuation absents."],
            'DISPOSITIFS COMPLEMENTAIRES': ["Extincteurs portatifs OK.", "BAES fonctionnels.", "BAES hors service."]
        },
        'SECURITE SPECIFIQUE': {
            'CHAUFFERIE (EXTINCTEURS)': ["Moyens de première intervention présents (sable, extincteurs).", "Installation non conforme ou incomplète."],
            'CHAUFFERIE (PORTE COUPE-FEU)': ["Porte coupe-feu conforme avec ferme-porte.", "Dispositif coupe-feu absent ou dégradé."],
            'CHAUFFERIE (CONTROLES PERIODIQUES)': ["Contrôles réglementaires réalisés et vérifiés.", "Contrôles non fournis."],
            'CHAUFFERIE (LIVRET)': ["Livret de chaufferie tenu à jour.", "Livret absent ou incomplet."],
            'PARKING SOUS SOL (EXTINCTEURS)': ["Extincteurs et caisse de sable conformes.", "Moyens d'extinction absents ou incomplets."],
            'PARKING SOUS SOL (ECLAIRAGE)': ["Éclairage de sécurité (BAES) installé et conforme.", "Éclairage de sécurité absent ou non fonctionnel."]
        }
    };

    let state = { name: "", fileNum: "", photos: [] };
    let currentSec = "";

    function limit6(el) {
        if (el.value.length > 6) el.value = el.value.slice(0, 6);
        save();
    }

    function showTab(cat) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        event.currentTarget.classList.add('active');

        if (DB[cat]) {
            currentSec = cat;
            document.getElementById('view-SECTION').classList.add('active');
            document.getElementById('secTitle').innerText = cat;
            document.getElementById('subPoste').innerHTML = Object.keys(DB[cat]).map(k => `<option value="${k}">${k}</option>`).join('');
            loadComments();
            drawGallery();
        } else {
            document.getElementById('view-' + cat).classList.add('active');
            if(cat === 'EXPORT') document.getElementById('photoCount').innerText = state.photos.length;
        }
    }

    function loadComments() {
        const sub = document.getElementById('subPoste').value;
        document.getElementById('commentList').innerHTML = DB[currentSec][sub].map(c => 
            `<div class="comment-item" onclick="document.getElementById('finalTxt').value='${c.replace(/'/g, "\\'")}'">${c}</div>`
        ).join('');
    }

    function onFile(e) {
        const file = e.target.files[0];
        if(!file) return;
        document.getElementById('editor').style.display = 'block';
        document.getElementById('finalTxt').value = "";
        
        const reader = new FileReader();
        reader.onload = (ev) => { window.lastB64 = ev.target.result; };
        reader.readAsDataURL(file);
    }

    function savePhoto() {
        const cvs = document.getElementById('canvas-hidden');
        const ctx = cvs.getContext('2d');
        const img = new Image();
        img.onload = () => {
            cvs.width = 1000; cvs.height = 750;
            ctx.drawImage(img, 0, 0, 1000, 750);
            
            ctx.fillStyle = "rgba(0,0,0,0.85)"; 
            ctx.fillRect(0, 650, 1000, 100);
            
            ctx.fillStyle = "#c5a059"; 
            ctx.font = "bold 22px Arial";
            ctx.fillText(document.getElementById('subPoste').value + (state.fileNum ? " | DOSSIER " + state.fileNum : ""), 25, 685);
            
            ctx.fillStyle = "white"; 
            ctx.font = "19px Arial";
            ctx.fillText(document.getElementById('finalTxt').value, 25, 725);
            
            state.photos.push({ 
                sec: currentSec, 
                sub: document.getElementById('subPoste').value, 
                txt: document.getElementById('finalTxt').value, 
                b64: cvs.toDataURL("image/png") 
            });
            
            save(); 
            drawGallery(); 
            document.getElementById('editor').style.display = 'none';
        };
        img.src = window.lastB64;
    }

    function drawGallery() {
        document.getElementById('gal').innerHTML = state.photos.filter(p => p.sec === currentSec).map(p => `<img src="${p.b64}">`).join('');
    }

    function save() {
        state.name = document.getElementById('projName').value;
        state.fileNum = document.getElementById('fileNumber').value;
        localStorage.setItem('dtg_pro_no_ai', JSON.stringify(state));
    }

    function exportHTML() {
        let h = `<html><body style="font-family:sans-serif;padding:30px;background:#f0f0f0;"><h1>Rapport DTG | Dossier ${state.fileNum} : ${state.name}</h1>`;
        state.photos.forEach(p => h += `<div style="background:white;padding:15px;margin-bottom:20px;border-radius:10px;"><h3>[${p.sec}] ${p.sub}</h3><img src="${p.b64}" style="max-width:800px; width:100%;"><p>${p.txt}</p></div>`);
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([h + '</body></html>'], {type:'text/html'})); a.download = `RAPPORT_${state.fileNum || 'DTG'}.html`; a.click();
    }

    async function exportZIP() {
        const zip = new JSZip();
        state.photos.forEach((p, i) => zip.file(`${p.sec}/${p.sub.replace(/[\/\\]/g, '_')}_${i}.png`, p.b64.split(',')[1], {base64: true}));
        zip.generateAsync({type:"blob"}).then(b => {
            const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `PHOTOS_ADN_${state.fileNum || 'DTG'}.zip`; a.click();
        });
    }

    function resetApp() { if(confirm("Supprimer toutes les données et photos de ce dossier ?")) { localStorage.clear(); location.reload(); } }

    window.onload = () => {
        const s = localStorage.getItem('dtg_pro_no_ai');
        if(s) { 
            state = JSON.parse(s); 
            document.getElementById('projName').value = state.name; 
            document.getElementById('fileNumber').value = state.fileNum; 
        }
    };
</script>
</body>
</html>
